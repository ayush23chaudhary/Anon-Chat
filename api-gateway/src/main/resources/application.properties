# AnonChat API Gateway Configuration
# Spring Boot 3.2.3 with Java 17

# Server Configuration
# Use PORT env var if provided (Render/other platforms), otherwise default to 8081
server.port=${PORT:8081}
server.servlet.context-path=/api
spring.application.name=anonchat-api-gateway

# JWT Configuration
app.jwt.secret=anonchat-secret-key-minimum-32-characters-for-production-use-only-change-this
app.jwt.expiryMs=3600000

# Database Configuration - Uses environment variables from Render/Koyeb
# Falls back to H2 if variables are not set (local development)
spring.datasource.url=${DB_URL:jdbc:h2:mem:anonchat}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# Server Port
server.port=8081
server.servlet.context-path=/api

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging Configuration
logging.level.root=INFO
logging.level.com.anonchat=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Application Configuration
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
spring.profiles.active=dev

# Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
